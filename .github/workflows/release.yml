name: Release Go modules

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Go module version (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Set version in root go.mod
        run: |
          VER="${{ inputs.version }}"
          # Strip leading 'v' for matching (go versions don't include 'v' in file)
          sed -i "s/v0\.0\.0/${VER}/g" go.mod

      - name: Run go mod tidy
        run: go mod tidy

      - name: Read declared core version
        id: core
        run: echo "value=$(cat .core-version)" >> "$GITHUB_OUTPUT"

      - name: Download native libraries from vaultblob-core
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download "${{ steps.core.outputs.value }}" \
            --repo "f4vzvy99f7-sys/vaultblob-core" \
            --dir /tmp/native-libs || echo "No core release ${{ steps.core.outputs.value }} — keeping existing binaries"

      - name: Install native libraries into bin/
        run: |
          declare -A MAP
          MAP["libvaultblob.so-linux-amd64"]="linux_amd64/libvaultblob.so"
          MAP["libvaultblob.so-linux-arm64"]="linux_arm64/libvaultblob.so"
          MAP["libvaultblob.dylib-darwin-amd64"]="darwin_amd64/libvaultblob.dylib"
          MAP["libvaultblob.dylib-darwin-arm64"]="darwin_arm64/libvaultblob.dylib"
          MAP["vaultblob.dll-windows-amd64"]="windows_amd64/vaultblob.dll"

          for asset in "${!MAP[@]}"; do
            if [ -f "/tmp/native-libs/$asset" ]; then
              cp "/tmp/native-libs/$asset" "bin/${MAP[$asset]}"
              echo "Installed $asset → bin/${MAP[$asset]}"
            else
              echo "Warning: $asset not found in release assets"
            fi
          done

      - name: Commit, tag, and push
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add -f bin/ go.mod go.sum
          git diff --cached --quiet || git commit -m "release ${{ inputs.version }}"

          TAG="${{ inputs.version }}"
          git tag "$TAG"
          for dir in bin/*/; do
            platform="$(basename "$dir")"
            git tag "bin/${platform}/${TAG}"
          done

          git remote set-url origin \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          git push origin --tags

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes "Go bindings for vaultblob-core ${{ steps.core.outputs.value }}"
